hmm:
  n_components: 3
  n_iter: 1000
  random_state: 42

xgboost:
  n_estimators: 1000
  learning_rate: 0.05
  max_depth: 4
  subsample: 0.8
  colsample_bytree: 0.8
  early_stopping_rounds: 50
  random_state: 42

data:
  trading_days: 252

conformal:
  alpha_levels: [0.20, 0.10, 0.05]
  asymmetry: 0.7    # fraction of alpha budget on upper tail (risk-management oriented)

walkforward:
  n_splits: 5       # number of expanding folds
  step_size: 252    # test window per fold (1 trading year)
  min_train_size: 1260  # minimum 5 years of training data before first fold
